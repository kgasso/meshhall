# config/plugins/checkin.yaml

max_roll: 20
default_missing_hours: 24

# ── Command privileges ────────────────────────────────────────────────────────
privileges:
  checkin: 1        # floor: 1 — any registered user can check in
  status:  1        # floor: 1 — anyone can query welfare status
  missing: 1        # floor: 1 — anyone can see who hasn't checked in
  roll:    1        # floor: 1 — anyone can see the full station roll
